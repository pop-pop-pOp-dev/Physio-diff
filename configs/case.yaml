project:
  seed: 42
  device: cuda
  output_dir: outputs/case

data:
  dataset_name: case
  root_dir: ./data/CASE
  cache_dir: ./outputs/cache_case
  prebuilt_cache_path: ""
  processed_label_path: ""
  subjects: []
  split_strategy: groupkfold
  cv_n_splits: 5
  cv_fold_index: 0
  val_subject_count: 1
  channels: [eda, bvp]
  include_acc: true
  target_fs: 64
  window_length: 640
  window_stride: 160
  zscore: true
  clip_mode: soft
  clip_value: 5.0

model:
  hidden_channels: 96
  depth: 30
  kernel_size: 5
  dilation_cycle: 10
  embedding_dim: 128
  num_classes: 2
  dropout: 0.1

diffusion:
  timesteps: 1000
  schedule: cosine
  beta_start: 0.0001
  beta_end: 0.02

loss:
  w_simple: 1.0
  w_kin_start: 0.0
  w_kin_end: 0.0005
  w_freq_start: 0.0
  w_freq_end: 0.0005
  warmup_epochs: 20
  w_cls_start: 0.0
  w_cls_end: 0.5

train:
  epochs: 120
  batch_size: 48
  lr: 0.0001
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  use_amp: true
  amp_dtype: fp16
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
  cond_drop_prob: 0.1
  log_every: 5
  save_every: 1
  weighted_sampling: true

eval:
  classifier_epochs: 30
  classifier_lr: 0.001
  noise_acc_std: 0.5
  synth_samples_per_class: 1000
  unnormalize: true
  gen_batch_size: 50
  cfg_scale: 2.0
  cfg_rescale: true
  x0_clip_quantile: 0.995
  x_t_clip: 20.0
  use_existing_model: false
