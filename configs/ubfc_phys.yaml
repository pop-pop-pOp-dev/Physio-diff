project:
  seed: 42
  device: cuda
  output_dir: outputs/ubfc_phys

data:
  dataset_name: ubfc_phys
  root_dir: ./data/UBFC-PHYS
  cache_dir: ./outputs/cache_ubfc_phys
  prebuilt_cache_path: ""
  processed_label_path: ""
  subjects: []
  split_strategy: groupkfold
  cv_n_splits: 5
  cv_fold_index: 0
  val_subject_count: 1
  channels: [eda, bvp]
  include_acc: true
  target_fs: 64
  window_length: 640
  window_stride: 160
  zscore: true
  clip_mode: soft
  clip_value: 5.0

model:
  model_type: mechanistic
  hidden_channels: 96
  depth: 30
  kernel_size: 5
  dilation_cycle: 10
  embedding_dim: 128
  num_classes: 2
  dropout: 0.1

diffusion:
  timesteps: 1000
  schedule: cosine
  beta_start: 0.0001
  beta_end: 0.02

loss:
  w_simple: 1.0
  w_kin_start: 0.0
  w_kin_end: 0.0005
  w_freq_start: 0.0
  w_freq_end: 0.0005
  warmup_epochs: 20
  w_cls_start: 0.0
  w_cls_end: 0.5
  w_mech: 0.2
  w_proto: 0.4
  w_domain: 0.2
  w_consistency: 0.15

train:
  epochs: 120
  batch_size: 16
  lr: 0.0001
  num_workers: 4
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
  cond_drop_prob: 0.1
  anchor_labels: true
  domain_generalization: true
  dg_grl_lambda: 1.0
  artifact_aware: true
  log_every: 5
  save_every: 1
  weighted_sampling: true

eval:
  classifier_epochs: 30
  classifier_lr: 0.001
  synth_samples_per_class: 1000
  gen_batch_size: 50
  cfg_scale: 2.0
  cfg_rescale: true
  x0_clip_quantile: 0.995
  x_t_clip: 20.0
  use_existing_model: false
